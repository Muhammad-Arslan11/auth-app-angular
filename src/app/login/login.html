<div class="app-login-form">
    <h2>{{isLogInMode ? 'Login' : 'Signup'}}</h2>
    <app-snackbar *ngIf="errorMessage" [errorMessage]="errorMessage"></app-snackbar>
    <form #LoginForm="ngForm" (ngSubmit)="onFormSubmitHandler(LoginForm)">
        <div class="form-input">
            <label>Email Address</label>
            <input type="email" placeholder="Email address" name="email" ngModel required>
        </div>
        <div class="form-input">
            <label>Password</label>
            <input type="password" placeholder="Password" name="password" ngModel required>
        </div>           
        <button type="submit" class="app-login-btn">Login</button>
        <p>Do not have an accout yet? 
            <button type="button" class="app-toggle-btn" (click)="onSwitchHandler()">Register Here.</button>
        </p>
    </form>
</div>
